name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      # flutter analyze does not load analysis_server_plugin plugins (riverpod_lint
      # among them) — only `dart analyze` does. Run both: flutter analyze for the
      # Flutter-tool-specific checks, dart analyze so riverpod_lint actually runs.
      - run: dart analyze
      - run: flutter test
