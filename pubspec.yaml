name: flutter_starter
description: "Opinionated Riverpod starter kit wiring flutter_kits into a running app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^14.6.2
  intl: ^0.20.2
  equatable: ^2.0.5
  package_info_plus: ^9.0.0
  firebase_core: ^3.12.1

  api_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: api_kit, ref: v1.1.4 }
  storage_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: storage_kit, ref: v1.1.4 }
  logging_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: logging_kit, ref: v1.1.4 }
  widget_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: widget_kit, ref: v1.1.4 }
  localization_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: localization_kit, ref: v1.1.4 }
  navigation_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: navigation_kit, ref: v1.1.4 }
  notify_kit:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: notify_kit, ref: v1.1.4 }
  force_update_gate:
    git: { url: https://github.com/loqmanali/flutter_kits.git, path: force_update_gate, ref: v1.1.4 }

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  generate: true
